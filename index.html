<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVESTO העוזר החכם</title>
  <meta name="theme-color" content="#eef4ff" />
  <link rel="stylesheet" href="./styles.css?v=20260322-investo-v1" />
</head>
<body>
  <div class="appShell">
    <header class="topbar">
      <div class="brand">
        <div class="brand__orb" aria-hidden="true"></div>
        <div>
          <div class="brand__kicker">GEMEL INVEST</div>
          <h1 class="brand__title">INVESTO העוזר החכם</h1>
        </div>
      </div>
      <button id="btnReset" class="ghostBtn" type="button">שיחה חדשה</button>
    </header>

    <main class="chatCard">
      <section id="messages" class="messages" aria-live="polite" aria-label="הודעות צ'אט"></section>

      <div id="typingRow" class="typingRow" hidden>
        <div class="typingBubble">
          <span></span><span></span><span></span>
        </div>
      </div>

      <section class="composer">
        <div class="composer__hint">
          מידע רפואי מוצג כמידע כללי בלבד ואינו מחליף רופא או רוקח.
        </div>
        <div class="composer__row">
          <textarea
            id="chatInput"
            class="composer__input"
            placeholder="כתוב שאלה על תרופות, מידע רפואי כללי או הנחות לפי חברה / מוצר / גיל"
            rows="1"
          ></textarea>
          <button id="btnSend" class="sendBtn" type="button">שלח</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./discount-rules.js?v=20260322-investo-v1"></script>
  <script src="./app.js?v=20260322-investo-v1"></script>
</body>
</html>
